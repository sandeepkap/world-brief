name: world-brief

on:
  schedule:
    # Every 4 hours, all day, on a grid anchored to the US market open.
    # Times are UTC. GitHub cron doesn't observe DST — these are set for
    # CENTRAL DAYLIGHT TIME (summer, UTC-5). In winter (CST, UTC-6) each fires
    # 1 hour earlier locally — subtract 1 from each hour below to realign.
    - cron: "30 13 * * *"   # 8:30am CT — market OPEN (anchor)
    - cron: "30 17 * * *"   # 12:30pm CT — midday
    - cron: "30 21 * * *"   # 4:30pm CT — post-close wrap (~1.5h after 3pm close)
    - cron: "30 1 * * *"    # 8:30pm CT — evening
    - cron: "30 5 * * *"    # 12:30am CT — overnight
    - cron: "30 9 * * *"    # 4:30am CT — pre-dawn
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate and send briefing
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY:       ${{ secrets.FMP_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python brief.py