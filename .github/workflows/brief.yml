name: world-brief

on:
  schedule:
    # Times are UTC. GitHub cron doesn't observe DST, so these are set for
    # CENTRAL DAYLIGHT TIME (summer, UTC-5). In winter (CST, UTC-6) each fires
    # 1 hour earlier in local time — subtract 1 from each hour below to fix.
    - cron: "30 12 * * 1-5"   # 7:30am CT — pre-market read
    - cron: "30 13 * * 1-5"   # 8:30am CT — market open
    - cron: "30 16 * * 1-5"   # 11:30am CT — midday
    - cron: "0 20 * * 1-5"    # 3:00pm CT — close wrap
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate and send briefing
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY:       ${{ secrets.FMP_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python brief.py